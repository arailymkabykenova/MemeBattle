version: '3.8'

services:
  # База данных PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: meme_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meme_game}
      POSTGRES_USER: ${POSTGRES_USER:-meme_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meme_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meme_user} -d ${POSTGRES_DB:-meme_game}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для кэширования и сессий
  redis:
    image: redis:7-alpine
    container_name: meme_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI приложение
  app:
    build: .
    container_name: meme_backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # Основные настройки
      - APP_NAME=${APP_NAME:-Meme Card Game API}
      - DEBUG=${DEBUG:-false}
      - VERSION=${VERSION:-1.0.0}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      
      # База данных
      - DATABASE_URL=postgresql://${POSTGRES_USER:-meme_user}:${POSTGRES_PASSWORD:-meme_password}@postgres:5432/${POSTGRES_DB:-meme_game}
      
      # Redis
      - REDIS_URL=redis://redis:6379
      
      # JWT настройки
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-168}
      
      # Game Center
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      
      # Azure Storage
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME}
      
      # Azure OpenAI
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      
      # CORS
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker для фоновых задач
  celery_worker:
    build: .
    container_name: meme_celery_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      # Основные настройки
      - APP_NAME=${APP_NAME:-Meme Card Game API}
      - DEBUG=${DEBUG:-false}
      - VERSION=${VERSION:-1.0.0}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      
      # База данных
      - DATABASE_URL=postgresql://${POSTGRES_USER:-meme_user}:${POSTGRES_PASSWORD:-meme_password}@postgres:5432/${POSTGRES_DB:-meme_game}
      
      # Redis
      - REDIS_URL=redis://redis:6379
      
      # JWT настройки
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-168}
      
      # Game Center
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      
      # Azure Storage
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME}
      
      # Azure OpenAI
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  # Celery Beat для периодических задач
  celery_beat:
    build: .
    container_name: meme_celery_beat
    command: celery -A app.core.celery_app beat --loglevel=info
    environment:
      # Основные настройки
      - APP_NAME=${APP_NAME:-Meme Card Game API}
      - DEBUG=${DEBUG:-false}
      - VERSION=${VERSION:-1.0.0}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      
      # База данных
      - DATABASE_URL=postgresql://${POSTGRES_USER:-meme_user}:${POSTGRES_PASSWORD:-meme_password}@postgres:5432/${POSTGRES_DB:-meme_game}
      
      # Redis
      - REDIS_URL=redis://redis:6379
      
      # JWT настройки
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-168}
      
      # Game Center
      - APPLE_TEAM_ID=${APPLE_TEAM_ID}
      
      # Azure Storage
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
      - AZURE_CONTAINER_NAME=${AZURE_CONTAINER_NAME}
      
      # Azure OpenAI
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_DEPLOYMENT_NAME=${AZURE_OPENAI_DEPLOYMENT_NAME}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - production

  # Nginx reverse proxy (опционально)
  nginx:
    image: nginx:alpine
    container_name: meme_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: meme_network 